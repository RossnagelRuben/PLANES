# Deploy Blazor WebAssembly (PLANES - Club San Jorge) a GitHub Pages
# Repo: RossnagelRuben/PLANES → https://rossnagelruben.github.io/PLANES/

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Publicar el proyecto PLANES (raíz)
      - name: Publish Blazor WASM
        run: dotnet publish ./PLANES.csproj -c Release -o publish

      # Base path para GitHub Pages (https://rossnagelruben.github.io/PLANES/)
      - name: Ajustar base href para GitHub Pages
        run: |
          HTML="publish/wwwroot/index.html"
          if [ -f "$HTML" ]; then
            sed -i 's|<base href="/" />|<base href="/PLANES/" />|g' "$HTML"
            grep -o '<base href="[^"]*"' "$HTML"
          fi

      - name: Preparar sitio para GitHub Pages
        run: |
          mkdir -p site
          if [ -d publish/wwwroot ]; then
            cp -r publish/wwwroot/* site/
            cp -r publish/wwwroot/.nojekyll site/ 2>/dev/null || true
          else
            cp -r publish/* site/
          fi
          touch site/.nojekyll
          if [ ! -d site/_framework ]; then
            echo "ERROR: _framework no encontrado."
            ls -la publish/ 2>/dev/null || true
            ls -la publish/wwwroot/ 2>/dev/null || true
            exit 1
          fi
          echo "Contenido del sitio:"
          ls -la site/
          ls site/_framework/ | head -10

      - name: Subir artifact (GitHub Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
